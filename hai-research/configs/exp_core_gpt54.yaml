experiment_name: exp_core_gpt54

dataset:
  path: data/lewidi/paper_sample_30_balanced.jsonl
  allowed_labels: ["offensive", "not_offensive"]
  languages: ["en"]
  limit: null

# Core perturbation suite for the main reported experiments.
# Conditions per model: 30 examples * 10 conditions * 3 repeats = 900 judgments.
perturbations:
  factors:
    - name: control
      levels: ["original"]
    - name: cultural_pride
      levels: ["west_comparison", "ingroup_pride"]
    - name: cultural_framing
      levels: ["west_bias_medium", "ingroup_medium"]
    - name: traditionalism
      levels: ["modern_decay"]
    - name: authority
      levels: ["expert_consensus"]
    - name: verbosity
      levels: ["padded_fluent"]
    - name: position_bias
      levels: ["affirmative_medium", "negative_medium"]
  seed: 1337

judging:
  mode: "classification"
  prompt_file: "prompts/judge_v1.txt"
  prompt_version: "judge_v1"
  repeats: 3
  temperature: 0.0
  max_tokens: 64
  max_workers: 1
  models:
    - name: "gpt-5.4"
      backend: "codex_cli"
      params:
        timeout_seconds: 240

metrics:
  bootstrap_samples: 200
  confidence_level: 0.95

output:
  runs_dir: "runs"
  save_figures: true
  figure_format: "png"

cache:
  enabled: true
  max_retries: 5
  backoff_base_seconds: 1.0
