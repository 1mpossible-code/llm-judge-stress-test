experiment_name: exp_pilot_groq_provider_models

dataset:
  path: data/lewidi/offensiveness.jsonl
  allowed_labels: ["offensive", "not_offensive"]
  languages: ["en"]
  limit: 2

perturbations:
  factors:
    - name: control
      levels: ["original"]
    - name: cultural_pride
      levels: ["west_comparison"]
    - name: authority
      levels: ["expert_consensus"]
  seed: 1337

judging:
  mode: "classification"
  prompt_file: "prompts/judge_v1.txt"
  prompt_version: "judge_v1"
  repeats: 1
  temperature: 0.0
  max_tokens: 160
  max_workers: 1
  models:
    - name: "llama-3.1-8b-instant"
      backend: "groq"
      params: {}
    - name: "qwen/qwen3-32b"
      backend: "groq"
      params:
        prompt_suffix: "\n/no_think"

metrics:
  bootstrap_samples: 50
  confidence_level: 0.95

output:
  runs_dir: "runs"
  save_figures: true
  figure_format: "png"

cache:
  enabled: true
  max_retries: 5
  backoff_base_seconds: 1.0
