experiment_name: exp_cli_validation_claude_codex

dataset:
  path: data/lewidi/paper_sample_30_balanced.jsonl
  allowed_labels: ["offensive", "not_offensive"]
  languages: ["en"]
  limit: null

perturbations:
  factors:
    - name: control
      levels: ["original"]
    - name: cultural_pride
      levels: ["west_comparison", "ingroup_pride"]
    - name: authority
      levels: ["expert_consensus"]
    - name: verbosity
      levels: ["padded_fluent"]
    - name: position_bias
      levels: ["negative_medium"]
  seed: 1337

judging:
  mode: "classification"
  prompt_file: "prompts/judge_v1.txt"
  prompt_version: "judge_v1"
  repeats: 1
  temperature: 0.0
  max_tokens: 64
  max_workers: 1
  models:
    - name: "claude-haiku-4-5-20251001"
      backend: "claude_cli"
      params:
        timeout_seconds: 180
        cost_limit_usd: "0.02"
    - name: "gpt-5.4"
      backend: "codex_cli"
      params:
        timeout_seconds: 240

metrics:
  bootstrap_samples: 100
  confidence_level: 0.95

output:
  runs_dir: "runs"
  save_figures: true
  figure_format: "png"

cache:
  enabled: true
  max_retries: 5
  backoff_base_seconds: 1.0
