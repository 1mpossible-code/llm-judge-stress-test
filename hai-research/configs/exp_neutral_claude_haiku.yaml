experiment_name: exp_neutral_claude_haiku

dataset:
  path: data/lewidi/paper_sample_30_balanced.jsonl
  allowed_labels: ["offensive", "not_offensive"]
  languages: ["en"]
  limit: null

perturbations:
  factors:
    - name: control
      levels: ["original"]
    - name: neutral_context
      levels: ["online_discussion"]
  seed: 1337

judging:
  mode: "classification"
  prompt_file: "prompts/judge_v1.txt"
  prompt_version: "judge_v1"
  repeats: 3
  temperature: 0.0
  max_tokens: 64
  max_workers: 1
  models:
    - name: "claude-haiku-4-5-20251001"
      backend: "claude_cli"
      params:
        timeout: "120s"

metrics:
  bootstrap_samples: 200
  confidence_level: 0.95

output:
  runs_dir: "runs"
  save_figures: true
  figure_format: "png"

cache:
  enabled: true
  max_retries: 5
  backoff_base_seconds: 1.0
